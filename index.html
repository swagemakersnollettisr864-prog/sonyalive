<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONYA LIVE</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0b0b0b;
color:white;
line-height:1.6;
}
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:linear-gradient(to bottom,#111,#000);
}
.container{
max-width:900px;
}
.badge{
display:inline-block;
background:#facc15;
color:black;
padding:10px 18px;
border-radius:999px;
font-weight:bold;
margin-bottom:25px;
}
h1{
font-size:58px;
font-weight:900;
line-height:1.2;
margin-bottom:25px;
}
p{
font-size:20px;
color:#d1d5db;
margin-bottom:35px;
}
.buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}
.btn{
padding:16px 32px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}
.kakao{
background:#facc15;
color:black;
}
.telegram{
border:1px solid #666;
color:white;
}
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#111;
padding:35px;
border-radius:24px;
border:1px solid #222;
}
.card h3{
margin:15px 0;
font-size:24px;
}
.number{
color:#facc15;
font-size:28px;
font-weight:bold;
}
.footer-box{
margin:80px auto;
max-width:1000px;
background:#facc15;
color:black;
padding:70px 20px;
border-radius:40px;
text-align:center;
}
.footer-box h2{
font-size:48px;
font-weight:900;
margin-bottom:20px;
}
.footer-box p{
color:#333;
}
.footer-box .btn{
margin-top:20px;
display:inline-block;
background:black;
color:white;
}
@media(max-width:768px){
h1{
font-size:40px;
}
p{
font-size:17px;
}
.footer-box h2{
font-size:34px;
}
}
</style>
</head>
<body>

<section class="hero">
<div class="container">
<div class="badge">실시간 시장 브리핑 · 1:1 상담</div>

<h1>
SONYA LIVE<br>
MARKET BRIEFING
</h1>

<p>
나스닥 · 골드 · 해외선물 실시간 흐름 체크<br>
시장 흐름과 타이밍 중심의 브리핑을 제공합니다.
</p>

<div class="buttons">
<a class="btn kakao" href="https://open.kakao.com/">카카오 상담 바로가기</a>
<a class="btn telegram" href="https://t.me/omgmanager2">텔레그램 문의</a>
</div>
</div>
</section>

<section class="section">

<div class="card">
<div class="number">01</div>
<h3>실시간 브리핑</h3>
<p>시장 흐름과 주요 변동 구간을 빠르게 체크합니다.</p>
</div>

<div class="card">
<div class="number">02</div>
<h3>1:1 대응</h3>
<p>개인 성향에 맞춘 대응 방향을 안내드립니다.</p>
</div>

<div class="card">
<div class="number">03</div>
<h3>흐름 중심 분석</h3>
<p>무리한 추격보다 자리와 흐름을 우선합니다.</p>
</div>

</section>

<div class="footer-box">
<h2>지금 시장 흐름 확인하기</h2>

<p>
실시간 브리핑과 상담을 통해<br>
현재 흐름을 함께 체크해보세요.
</p>

<a class="btn" href="https://open.kakao.com/">상담 시작하기</a>
</div>

</body>
</html>
